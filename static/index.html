<!doctype html>
<html>
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width,initial-scale=1.0" />
        <title>bin</title>
        <style>
            @font-face {
                font-family: 'Share Tech Mono';
                src: url('/fonts/ShareTechMono.woff2') format('woff2');
            }
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            body {
                background: #000;
                color: #fff;
                font-family: 'Share Tech Mono', monospace;
                height: 100vh;
                overflow: hidden;
            }
            #drop {
                position: fixed;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 14px;
                user-select: none;
                -webkit-user-select: none;
            }
            #bar {
                position: fixed;
                top: 0;
                left: 0;
                height: 4px;
                background: #fff;
                width: 0;
            }
            #st {
                position: fixed;
                top: 12px;
                left: 12px;
                font-size: 14px;
                display: none;
            }
            #dn {
                position: fixed;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                text-align: center;
                display: none;
            }
            #dn a {
                color: #fff;
            }
        </style>
    </head>
    <body>
        <div id="drop">UPLOAD</div>
        <div id="bar"></div>
        <div id="st"></div>
        <div id="dn"><a id="lnk" href="#"></a></div>
        <script>
            let b = document.getElementById("bar"),
                st = document.getElementById("st"),
                dn = document.getElementById("dn"),
                l = document.getElementById("lnk"),
                dr = document.getElementById("drop"),
                la = 0,
                tm = 0,
                done = false;
            function up(f) {
                if (!f || done) return;
                let x = new XMLHttpRequest();
                x.open("POST", "/upload");
                x.upload.onprogress = (e) => {
                    if (e.lengthComputable) {
                        b.style.width = (e.loaded / e.total) * 100 + "%";
                        st.style.display = "block";
                        let n = Date.now(),
                            sp = la ? (e.loaded - la) / ((n - tm) / 1000) : 0;
                        la = e.loaded;
                        tm = n;
                        let F = (b) =>
                            b >= 1e9
                                ? (b / 1e9).toFixed(1) + "GB"
                                : b >= 1e6
                                  ? (b / 1e6).toFixed(1) + "MB"
                                  : b >= 1e3
                                    ? (b / 1e3).toFixed(1) + "KB"
                                    : b + "B";
                        st.textContent =
                            F(e.loaded) +
                            " / " +
                            F(e.total) +
                            " - " +
                            F(sp) +
                            "/s";
                    }
                };
                x.onload = () => {
                    done = true;
                    dr.style.display = "none";
                    b.style.width = "0";
                    st.style.display = "none";
                    l.href = l.textContent = window.location + x.responseText;
                    dn.style.display = "block";
                };
                dr.style.display = "none";
                x.send(f);
            }
            document.addEventListener("dragover", (e) => e.preventDefault());
            document.addEventListener("drop", (e) => {
                e.preventDefault();
                if (done) return;
                up(e.dataTransfer.files[0]);
            });
            document.addEventListener("click", () => {
                if (done) return;
                let i = document.createElement("input");
                i.type = "file";
                i.onchange = () => up(i.files[0]);
                i.click();
            });
        </script>
    </body>
</html>
